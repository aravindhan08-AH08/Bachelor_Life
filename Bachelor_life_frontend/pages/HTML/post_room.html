<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Room - Bachelor Life</title>
  <link rel="stylesheet" href="../CSS/post_room.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<body>
  <header class="navbar">
    <div class="logo">
      <span class="logo-bachelor">Bachelor</span><span class="logo-life">Life</span>
    </div>
    <nav class="nav-links">
      <a href="../../index.html">Home</a>
      <a href="find_room.html">Find Rooms</a>
      <a href="post_room.html">Post Room</a>
    </nav>
    <div class="nav-right-group">
      <a href="login.html" class="login-btn">Login</a>
    </div>
  </header>

  <main class="post-room-container">
    <div class="form-card">
      <div class="form-header">
        <h1 class="form-title">List Your Room</h1>
        <p class="form-subtitle">
          Help bachelors find their perfect accommodation
        </p>
      </div>

      <form class="post-form">
        <div class="form-section-title">Room Details</div>
        <div class="form-grid">
          <div class="input-group">
            <label for="room-title">Room Title *</label>
            <input type="text" id="room-title" placeholder="e.g. Cozy Single Room in City Center" required />
          </div>
          <div class="input-group">
            <label for="room-type">Room Type *</label>
            <select id="room-type" required>
              <option value="" disabled selected>Select room type</option>
              <option value="single">Single Room</option>
              <option value="shared">Shared Room</option>
              <option value="1bhk">1 BHK</option>
              <option value="studio">2 BHK</option>
              <option value="3bhk">3 BHK</option>
              <option value="pg">PG / Hostel</option>
            </select>
          </div>
          <div class="input-group">
            <label for="monthly-rent">Monthly Rent (₹) *</label>
            <input type="number" id="monthly-rent" placeholder="15000" required min="1000" />
          </div>
          <div class="input-group">
            <label for="deposit">Deposit (₹) *</label>
            <input type="number" id="deposit" placeholder="50000" required min="0" />
          </div>

          <div class="input-group" id="sharing-capacity-group">
            <label for="sharing-capacity">Occupancy Capacity (Max Persons) *</label>
            <input type="number" id="sharing-capacity" placeholder="1" min="1" max="5" value="1" required />
          </div>

          <div class="input-group">
            <label for="gender-preference">Gender Preference *</label>
            <select id="gender-preference" required>
              <option value="Any">Any</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>

          <div class="input-group">
            <label for="location">Location *</label>
            <input type="text" id="location" placeholder="Area, City" required />
          </div>
          <div class="input-group">
            <label for="video-upload">Virtual Tour Video (File) *</label>
            <input type="file" id="video-upload" accept="video/*" />
            <div id="video-preview-container"></div>
          </div>
        </div>

        <div class="input-group description-group">
          <label for="description">Description *</label>
          <textarea id="description" rows="4" placeholder="Describe your room, nearby amenities, transportation, etc."
            required></textarea>
        </div>

        <div class="form-section-title">Amenities</div>
        <div class="amenities-grid">
          <label><input type="checkbox" /> Wifi</label>
          <label><input type="checkbox" /> AC</label>
          <label><input type="checkbox" /> Attached Bath</label>
          <label><input type="checkbox" /> Kitchen Access</label>
          <label><input type="checkbox" /> Parking</label>
          <label><input type="checkbox" /> Laundry</label>
          <label><input type="checkbox" /> Security</label>
          <label><input type="checkbox" /> Gym</label>
          <label><input type="checkbox" /> CCTV</label>
          <label><input type="checkbox" /> Semi Furnished</label>
        </div>

        <div class="bachelor-friendly-check">
          <label><input type="checkbox" checked /> This property is
            bachelor-friendly</label>
        </div>

        <div class="input-group">
          <label for="file-upload">Upload Room Photos & Videos (Multiple allowed):</label>
          <input type="file" id="file-upload" multiple accept="image/*,video/*" />
          <div id="image-preview-container"></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel">Cancel</button>
          <button type="submit" class="btn-submit">List Room</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2025 Bachelor Life | All Rights Reserved</p>
    <a href="about.html">About Us |</a>
    <a href="contact.html">Contact</a>
  </footer>
</body>
<script src="../JS/api-config.js"></script>
<script src="../JS/post_room.js"></script>

</html>
