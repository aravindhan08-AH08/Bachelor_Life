<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../CSS/signup.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <title>Bachelor Life - Create Account</title>
</head>

<body>
  <header class="navbar">
    <div class="logo">
      <span class="logo-bachelor">Bachelor</span><span class="logo-life">Life</span>
    </div>
    <nav class="nav-links">
      <a href="../../index.html">Home</a>
      <a href="find_room.html">Find Rooms</a>
      <a href="post_room.html">Post Room</a>
    </nav>
    <a href="login.html" class="login-btn">Login</a>
  </header>

  <main>
    <div class="container">
      <div class="form-card">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="home icon" class="home-icon" />
        <h2>Create Account</h2>
        <p>Join Bachelor Life today</p>

        <div class="role-selection-group">
          <label class="role-label" style="
                text-align: left;
                display: block;
                margin-bottom: 10px;
                font-weight: 600;
                color: #153e90;
              ">Signup as:</label>
          <div class="tab-buttons">
            <button type="button" class="tab active" id="bachelorTab">
              Bachelor
            </button>
            <button type="button" class="tab" id="ownerTab">
              Room Owner
            </button>
          </div>
        </div>

        <form id="signupForm">
          <div class="form-label">Full Name</div>
          <input type="text" id="fullName" placeholder="Enter your full name" required />

          <div class="form-label">Phone Number</div>
          <input type="text" id="phone" placeholder="Enter 10 digit number" required maxlength="10" minlength="10"
            pattern="\d{10}" />

          <div class="form-label">Email Address</div>
          <input type="email" id="email" placeholder="Enter your email" required />

          <div class="form-label">Gender</div>
          <select id="gender" required>
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>

          <div class="form-label">Password</div>
          <input type="password" id="password" placeholder="Create a password" required />

          <input type="hidden" id="userRole" value="Bachelor" />
          <button type="submit" class="btn-create">Create Account</button>
        </form>

        <p class="signin-text">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2025 Bachelor Life | All Rights Reserved</p>
    <a href="about.html">About Us |</a>
    <a href="contact.html">Contact</a>
  </footer>
</body>
<script src="../JS/api-config.js"></script>
<script src="../JS/signup.js"></script>

</html>
